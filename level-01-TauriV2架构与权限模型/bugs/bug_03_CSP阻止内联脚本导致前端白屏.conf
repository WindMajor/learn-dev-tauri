{
  "// BUG 类型": "CSP 策略过于严格 —— 阻止内联脚本/样式导致前端白屏",
  "// 这是什么错误": "tauri.conf.json 中 CSP 配置了 script-src 'self' 但前端使用了内联事件处理器（如 onclick='...'）或内联样式，浏览器拒绝执行，页面白屏",
  "// 前端控制台错误": [
    "Refused to execute inline script because it violates the following Content Security Policy directive: \"script-src 'self'\". Either the 'unsafe-inline' keyword, a hash ('sha256-...'), or a nonce ('nonce-...') is required to enable inline execution.",
    "Refused to apply inline style because it violates the following Content Security Policy directive: \"style-src 'self'\"."
  ],
  "// 为什么会这样": "Tauri v2 默认启用严格 CSP：禁止 eval、禁止内联脚本、禁止内联样式（除非显式添加 'unsafe-inline'）。这是防止 XSS 攻击的关键防线。",
  "// 在 Electron 中对应的行为": {
    "Electron": "Electron 默认不启用 CSP。即使 Web 页面有 CSP 头，Electron 的 BrowserWindow 可以在 webPreferences 中禁用或修改。这就是为什么很多 Electron 应用存在 XSS 漏洞。",
    "浏览器": "现代浏览器对 CSP 的执行与 Tauri v2 的 WebView 一致 —— 因为 Tauri 使用的是系统原生 WebView（本身就是浏览器引擎）。",
    "关键区别": "Electron 允许绕过 CSP，Tauri v2 不允许 —— 这从根本上杜绝了很多安全漏洞。"
  },
  "// 如何修复": "方案1：在 CSP 中添加 'unsafe-inline'（不推荐，削弱安全）\n方案2：使用 Vue3 的事件绑定（@click）替代 onclick 属性（推荐，Vue3 默认就写 @click）\n方案3：将内联样式移到 <style> 块或 CSS 文件中",

  "// 以下是严格 CSP 配置（触发白屏）",
  "strict_csp": "default-src 'self'; script-src 'self'; style-src 'self'",

  "// 修复方案1：允许内联样式（不推荐）",
  "relaxed_csp": "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'",

  "// 修复方案2：Tauri v2 推荐的 CSP（Vue3 安全配置）",
  "recommended_csp": "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ipc: http://ipc.localhost; img-src 'self' asset: https://asset.localhost",

  "// Vue3 开发者注意事项": "Vue3 的 SFC 编译会将 <style> 块编译为 <style> 标签（被 CSP 允许），但动态 style 绑定可能被阻止。SFC 的模板编译不生成内联 script，所以 script-src 'self' 足够安全。"
}
